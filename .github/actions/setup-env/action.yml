name: 'Setup Environment'
description: 'Shared action to setup Node.js and pnpm'

runs:
  using: 'composite'
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11.3.0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install
      shell: bash
